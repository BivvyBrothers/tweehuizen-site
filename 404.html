<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pagina niet gevonden | TweeHuizen</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#2F5F8F">
<link rel="icon" type="image/png" href="/favicon-180.png?v=1">
<link rel="apple-touch-icon" href="/favicon-180.png?v=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #24323F;
    background: #F0EDE8;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .logo { width: min(180px, 45vw); height: auto; margin: 0 auto 24px; display: block; filter: drop-shadow(0 12px 24px rgba(47, 95, 143, 0.12)); }
  h1 { font-size: clamp(40px, 9vw, 64px); font-weight: 700; letter-spacing: -1px; line-height: 1.1; }
  h1 .blue { color: #2F5F8F; }
  h1 .green { color: #6B9A6B; }
  p { color: #667381; max-width: 44ch; margin: 12px auto 28px; font-size: 17px; }
  a.btn {
    display: inline-block;
    padding: 13px 26px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 15px;
    text-decoration: none;
    background: #2F5F8F;
    color: #fff;
    transition: background 0.2s ease, transform 0.2s ease;
    line-height: 1;
  }
  a.btn:hover { background: #4A90D9; transform: translateY(-1px); }
</style>
</head>
<body>
<main>
  <img src="/logo-transparent.png" alt="TweeHuizen logo" class="logo" width="440" height="440">
  <h1><span class="blue">4</span><span class="green">0</span><span class="blue">4</span></h1>
  <p>Deze pagina bestaat niet (meer). Alles over TweeHuizen, van functies tot veelgestelde vragen, vind je op de homepagina.</p>
  <a class="btn" href="/">Naar de homepagina</a>
</main>
</body>
</html>
